<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Defense</title>
    <link rel="stylesheet" href="css/style.css?v=1771453500">
    <style>
        @media (max-width: 820px) {
            body {
                align-items: flex-start !important;
                justify-content: flex-start !important;
                overflow: hidden !important;
            }
            #game-container {
                transform-origin: top center;
                position: absolute;
                left: 50%;
                top: 0;
            }
        }
    </style>
    <script>
        function scaleGame() {
            var container = document.getElementById('game-container');
            if (!container) return;

            // Reset before measuring
            container.style.transform = '';
            container.style.marginLeft = '';
            container.style.top = '';
            container.style.left = '';
            container.style.position = '';

            if (window.innerWidth > 820) return;

            // Let mobile CSS reflow first, then measure actual rendered size
            requestAnimationFrame(function () {
                var rect = container.getBoundingClientRect();
                var width = rect.width || container.offsetWidth || 800;
                var height = rect.height || container.offsetHeight || 700;
                var scale = Math.min(window.innerWidth / width, window.innerHeight / height, 1);

                container.style.position = 'absolute';
                container.style.left = '50%';
                container.style.top = '0px';
                container.style.transformOrigin = 'top center';
                container.style.transform = 'translateX(-50%) scale(' + scale + ')';
            });
        }
        window.addEventListener('load', scaleGame);
        window.addEventListener('resize', scaleGame);
        window.addEventListener('orientationchange', scaleGame);
    </script>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="hud-top">
            <span id="gold">💰 200</span>
            <span id="wave-info">Wave 1/5</span>
            <span id="lives">❤️ 20</span>
            <span id="wave-preview"></span>
            <span id="score">Score: 0</span>
            <span id="speed-controls">
                <button id="speed1" class="speed-btn active" onclick="game.setSpeed(1)">1x</button>
                <button id="speed2" class="speed-btn" onclick="game.setSpeed(2)">2x</button>
            </span>
        </div>
        <div id="hud-bottom">
            <div class="hud-build-row">
                <button class="tower-btn" data-tower="blaster" onclick="game.selectTower('blaster')">
                    <span class="tower-icon blaster-icon">△</span>
                    Blaster $50
                </button>
                <button class="tower-btn" data-tower="sniper" onclick="game.selectTower('sniper')">
                    <span class="tower-icon sniper-icon">◇</span>
                    Sniper $100
                </button>
                <button class="tower-btn" data-tower="aoe" onclick="game.selectTower('aoe')">
                    <span class="tower-icon aoe-icon">⬡</span>
                    AOE $150
                </button>
                <button class="tower-btn" data-tower="boat" id="boat-btn" onclick="game.selectTower('boat')" style="display:none">
                    <span class="tower-icon boat-icon">⛵</span>
                    Boat $75
                </button>
                <button class="tower-btn" data-tower="sentinel" onclick="game.selectTower('sentinel')">
                    <span class="tower-icon sentinel-icon">⚔️</span>
                    Sentinel $75
                </button>
                <button class="tower-btn trap-btn" data-tower="mine" onclick="game.selectTower('mine')">
                    <span class="tower-icon mine-icon">💣</span>
                    Mine $30
                </button>
                <button class="tower-btn trap-btn" data-tower="poison" onclick="game.selectTower('poison')">
                    <span class="tower-icon poison-icon">☠️</span>
                    Poison $40
                </button>
                <button class="tower-btn trap-btn" data-tower="ice" onclick="game.selectTower('ice')">
                    <span class="tower-icon ice-icon">❄️</span>
                    Ice $25
                </button>
            </div>
            <div class="hud-action-row">
                <button class="tower-btn sell-btn" onclick="game.selectTower('sell')">Sell</button>
                <button id="start-wave-btn" onclick="game.startWave()">▶ Start Wave</button>
                <button id="bestiary-btn" onclick="UI.toggleBestiary()">❓</button>
            </div>
        </div>
        <div id="menu-screen">
            <h1>NEON DEFENSE</h1>
            <p class="subtitle">A Tower Defense Game</p>
            <p id="menu-high-score" style="color:#ffaa00;font-size:14px;margin-bottom:8px;"></p>
            <div id="map-info">
                <span id="map-name">Map: —</span>
                <span id="map-seed">Seed: —</span>
            </div>
            <button id="play-btn" onclick="game.startGame()">PLAY</button>
            <button id="new-map-btn" onclick="game.rerollMap()">🔄 NEW MAP</button>
            <div id="seed-input-row">
                <input type="text" id="seed-input" placeholder="Enter seed..." maxlength="10">
                <button onclick="game.loadSeed()">GO</button>
            </div>
            <p class="controls-hint">Place towers to defend against waves of enemies</p>
        </div>
        <div id="game-over-screen" style="display:none">
            <h1 id="end-title">GAME OVER</h1>
            <p id="end-message"></p>
            <p id="end-score"></p>
            <p id="end-high-score" style="color:#ffaa00;font-size:12px;"></p>
            <p id="end-map-info"></p>
            <div id="end-buttons">
                <button onclick="game.restart()">RETRY MAP</button>
                <button onclick="game.restartNewMap()">NEW MAP</button>
                <button class="menu-btn" onclick="game.backToMenu()">MENU</button>
            </div>
        </div>
    </div>

    <!-- Bestiary Modal -->
    <div id="bestiary-modal" style="display:none">
        <div id="bestiary-inner">
            <h2>ENEMY BESTIARY</h2>
            <div id="bestiary-content"></div>
            <button onclick="UI.toggleBestiary()">CLOSE</button>
        </div>
    </div>

    <script src="js/utils.js?v=1771453500"></script>
    <script src="js/audio.js?v=1771453500"></script>
    <script src="js/sprites.js?v=1771453500"></script>
    <script src="js/path.js?v=1771453500"></script>
    <script src="js/terrain.js?v=1771453500"></script>
    <script src="js/particle.js?v=1771453500"></script>
    <script src="js/projectile.js?v=1771453500"></script>
    <script src="js/enemy.js?v=1771453500"></script>
    <script src="js/tower.js?v=1771453500"></script>
    <script src="js/trap.js?v=1771453500"></script>
    <script src="js/sentinel.js?v=1771453500"></script>
    <script src="js/fortification.js?v=1771453500"></script>
    <script src="js/wave.js?v=1771453500"></script>
    <script src="js/ui.js?v=1771453500"></script>
    <script src="js/game.js?v=1771453500"></script>
</body>
</html>
